<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soccer Dynasty Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="authView" class="view centered">
      <div class="card auth-card">
        <h1>⚽ Soccer Dynasty Manager</h1>
        <p class="muted">Build your squad, run your finances, simulate matches, and climb the league.</p>
        <div class="tabs">
          <button id="tabLogin" class="btn btn-primary">Login</button>
          <button id="tabRegister" class="btn">Register</button>
        </div>

        <div id="loginPanel" class="panel active">
          <label>Username <input id="loginUsername" type="text" /></label>
          <label>Password <input id="loginPassword" type="password" /></label>
          <button id="loginBtn" class="btn btn-primary">Login</button>
        </div>

        <div id="registerPanel" class="panel">
          <label>Username <input id="registerUsername" type="text" /></label>
          <label>Password <input id="registerPassword" type="password" /></label>
          <button id="registerBtn" class="btn btn-primary">Create Account</button>
        </div>
        <p id="authMsg" class="status"></p>
      </div>
    </div>

    <div id="appView" class="view hidden">
      <aside class="sidebar card">
        <h2 id="teamNameHeader">My Team</h2>
        <p id="clubRecord" class="muted"></p>
        <label>Team Name <input id="teamNameInput" type="text" /></label>
        <label>Primary Color <input id="teamColorInput" type="color" value="#2f7cff" /></label>
        <label>Logo URL <input id="teamLogoInput" type="url" placeholder="https://..." /></label>
        <button id="saveBrandBtn" class="btn">Save Team Brand</button>

        <hr />
        <h3>Finance</h3>
        <p id="budgetLabel">Budget: $0</p>
        <label>Sponsor income (+$) <input id="incomeInput" type="number" min="0" value="100000" /></label>
        <label>Facilities expense (-$) <input id="expenseInput" type="number" min="0" value="50000" /></label>
        <button id="applyFinanceBtn" class="btn">Apply Financials</button>

        <hr />
        <button id="genRivalsBtn" class="btn">Generate AI Teams</button>
        <button id="simulateBtn" class="btn btn-primary">Simulate Next League Match</button>
        <button id="exportBtn" class="btn">Share Save (Export)</button>
        <input id="importInput" type="file" accept="application/json" hidden />
        <button id="importBtn" class="btn">Import Save</button>
        <button id="logoutBtn" class="btn">Logout</button>
      </aside>

      <main class="main-grid">
        <section class="card">
          <h3>Roster Manager</h3>
          <form id="addPlayerForm" class="grid-form">
            <label>Name <input id="pName" required type="text" /></label>
            <label>Gender
              <select id="pGender">
                <option>Male</option><option>Female</option><option>Non-binary</option>
              </select>
            </label>
            <label>Position
              <select id="pPosition">
                <option>GK</option><option>DEF</option><option>MID</option><option>FWD</option>
              </select>
            </label>
            <label>Skill Tier
              <select id="pTier">
                <option value="1">1</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="90">OP</option>
                <option value="120">Absolute God</option>
              </select>
            </label>
            <label>Jersey # <input id="pNumber" type="number" min="1" max="999" required /></label>
            <label>Photo (jpg/png) <input id="pPhoto" type="file" accept="image/jpeg,image/png" /></label>
            <button class="btn btn-primary" type="submit">Add Player</button>
          </form>
          <div id="roster" class="roster"></div>
        </section>

        <section class="card">
          <h3>League + Leaderboards</h3>
          <div id="standings"></div>
          <h4>Top Players</h4>
          <div id="topPlayers"></div>
          <h4>Achievements</h4>
          <ul id="achievements"></ul>
        </section>

        <section class="card wide">
          <h3>Match Center</h3>
          <div id="highlightStrip" class="highlights"></div>
          <pre id="commentary" class="commentary"></pre>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
